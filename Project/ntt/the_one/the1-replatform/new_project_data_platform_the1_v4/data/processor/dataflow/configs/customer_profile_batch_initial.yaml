# Customer Profile Batch Initial Pipeline
# This config is for one-time initial load from personas to ms_personas
# Similar to realtime pipeline but runs as batch (no dependency on AWS DTS data)

defaults_file: null

pipeline:
  name: ms_member_batch_initial
  mode: batch
  term: initial

params:
  pk: member_number
  run_dt: null # Set at runtime

io:
  bq:
    project: the1-insight-{WORKSPACE_ENV}
    dataset: insight
    temp_gcs: gs://the1-insight-{WORKSPACE_ENV}-data-pipeline-data-staging/audit_log/dataflow/temp
  s3:
    bucket: s3://t1-analytics/refined/insights
    num_shards: 10
    region: ap-southeast-1

# Parquet output configuration
parquet:
  output_filename: ms-member.parquet
  date_columns:
  - birth_date
  - consent_date
  - created_date
  - register_date
  - employee_join_date
  - employee_resign_date
  - passport_exp
  - updated_date

schema:
  bq:
    project: "the1-insight-{WORKSPACE_ENV}"
    dataset: "insight"
    table: "ms_personas"

formats:
  date:
  - "%Y-%m-%d"
  - "%d/%m/%Y"
  timestamp:
  - "%Y-%m-%d %H:%M:%S.%f"
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%dT%H:%M:%S.%f"
  - "%Y-%m-%dT%H:%M:%S"

# Pipeline plan for batch initial load
plan:
# Step 1: Load mapping from BigQuery (same format as streaming)
- step: RefreshMappingBatch
  id: mapping_refresh
  params:
    mapping_table: "{io.bq.project}.{io.bq.dataset}.mapping_reconcile"
    query: |
      SELECT
        reconcile_column_name
        , mapping_column_name
        , reconcile_retrieved
        , reconcile_confirmed
        , table_name
        , reconcile_skippable
        , updated_date
        , mapping_logic
        , mapping_alias_name
        , mapping_column_type
      FROM `{io.bq.project}.{io.bq.dataset}.mapping_reconcile`
      WHERE table_name = 'insight.ms_member'
  outputs:
  - mapping_refresh

# Step 2: Read personas from BigQuery (full load, no time filter)
- step: ReadBQQuery
  id: personas_rows
  query: |
    SELECT personaId,profiles FROM (
      SELECT personaId,profiles,ROW_NUMBER() OVER (PARTITION BY JSON_VALUE(profiles, '$.memberId') ORDER BY timestamp DESC) AS rn
      FROM `{io.bq.project}.{io.bq.dataset}.personas` 
      WHERE COALESCE(JSON_VALUE(profiles, '$.memberId'), '') <> ''
    ) WHERE rn = 1

  out: personas_rows

# Step 3: Parse JSON profiles field
- step: ParseJson
  id: personas_parsed
  in: personas_rows
  json_fields:
  - profiles
  out: personas_parsed

# Step 4: Filter out empty memberId (before transform)
- step: FilterEmptyPK
  id: filter_empty_pk
  params:
    input: personas_parsed
    field: profiles.memberId
  out: personas_filtered

# Step 5: Transform to target schemas (AWS and GCP branches)
# Uses TransformSchemasStep from streaming_step.py
- step: TransformSchemas
  id: transform_output
  params:
    mapping_info: mapping_refresh
    table_name: ms_member
    input: personas_filtered
  outputs:
  - aws_ms_personas
  - gcp_ms_personas

# Step 6: Fulfill AWS schema with all fields (missing fields = None)
# NOTE: Use 'out' not 'outputs' because this step returns single PCollection
- step: FullfillSchemas
  id: full_aws
  params:
    table_name: ms_member
    mapping_info: mapping_refresh
    input: aws_ms_personas
  out: aws_ms_member
# Step 7: Filter null memberId after transform (safety net for PROD edge cases)
- step: FilterNullField
  id: filter_null_memberid
  params:
    input: gcp_ms_personas
    field: memberId
  out: gcp_ms_personas_filtered

# Step 8: Write GCP data to BigQuery
- step: WriteToBigQueryStreaming
  id: write_gcp_bq
  params:
    table: "{io.bq.project}.{io.bq.dataset}.ms_personas"
    input: gcp_ms_personas_filtered
    write_disposition: WRITE_TRUNCATE

# Step 7: Write AWS data to S3 as Parquet
- step: WriteParquet
  in: aws_ms_member
  table_name: insight.ms_member
  mapping_info: mapping_refresh
  prefix: "{io.s3.bucket}/ms_personas_{WORKSPACE_ENV}/par_month={params.run_par_month}/par_day={params.run_par_day}/par_hour={params.run_par_hour}/run_dt={params.run_dt}"

