# Refactored ms_member_realtime config
# This config is for the refactored pipeline that uses stream_step.py
# instead of streaming.py (which uses realtime.py)

defaults_file: null

pipeline:
  name: ms_member_realtime
  mode: streaming
  term: realtime

params:
  pk: member_number
  run_dt: null

io:
  pubsub:
    subscription: "projects/the1-insight-{WORKSPACE_ENV}/subscriptions/ms-personas-datapipeline-dataflow-subscription"
  bigtable:
    project: the1-insight-{WORKSPACE_ENV}
    instance: t1-insight-bt
    table: personas
    family_columns:
    - profiles
    - consents

  bq:
    project: the1-insight-{WORKSPACE_ENV}
    dataset: insight
    # table: ms_personas
    # iceberg_table: ms_personas_iceberg
    temp_gcs: gs://the1-insight-{WORKSPACE_ENV}-data-pipeline-data-staging/audit_log/dataflow/temp
  s3:
    bucket: s3://t1-analytics/refined/insights/ms_personas_{WORKSPACE_ENV}
    region: ap-southeast-1

# Mapping refresh configuration
mapping:
  refresh_interval_sec: 60

# Sync configuration (for Iceberg sync)
sync:
  window_seconds: 10
  lookback_minutes: 30
  # MERGE query template for Iceberg sync
  # Placeholders: {iceberg_table}, {native_table}, {lookback_minutes}

  # Window configuration
  # window:
  #   size_sec: 300 # 5 minutes

  # Parquet output configuration
parquet:
  output_filename: ms-member.parquet

# DLQ configuration (commented - not yet implemented)
# dlq:
#   topic: "projects/the1-insight-stg/topics/dlq-realtime"

schema:
  bq:
    project: "{io.bq.project}"
    dataset: "{io.bq.dataset}"
    # table: "ms_personas"

formats:
  date:
  - "%Y-%m-%d"
  - "%d/%m/%Y"
  timestamp:
  - "%Y-%m-%d %H:%M:%S.%f"
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%dT%H:%M:%S.%f"
  - "%Y-%m-%dT%H:%M:%S"

# Pipeline plan for streaming realtime (config-driven)
plan:
# Step 1: Periodically refresh mapping table from BigQuery
- step: RefreshMappingTable
  id: mapping_refresh
  params:
    fire_interval: 30
    mapping_table: "{io.bq.project}.{io.bq.dataset}.mapping_reconcile"
    query: |
      SELECT 
       reconcile_column_name
      , mapping_column_name
      , reconcile_retrieved
      , reconcile_confirmed
      , table_name
      , reconcile_skippable
      , updated_date
      , mapping_logic
      , mapping_alias_name
      , mapping_column_type
      FROM `{io.bq.project}.{io.bq.dataset}.mapping_reconcile`

  outputs:
  - mapping_refresh

# Step 2: Read messages from Pub/Sub
- step: ReadFromPubSub
  id: message_rows
  params:
    subscription: "{io.pubsub.subscription}"
  outputs:
  - message_rows

# Step 3: Extract persona IDs from messages
- step: ExtractPersonas
  id: pk_value
  params:
    pk_col: personaId
    input: message_rows
  outputs:
  - pk_value

# Step 4: Fetch data from Bigtable using persona IDs
- step: FetchFromBigtable
  id: bt_rows
  params:
    project: "{io.bigtable.project}"
    instance: "{io.bigtable.instance}"
    table: "{io.bigtable.table}"
    pk_col: personaId
    parent_field:
    - profiles
    - consents
    input: pk_value
  outputs:
  - bt_rows

# Step 5: Filter out records with empty member IDs
- step: FilterEmptyPK
  id: bt_rows_filtered
  params:
    input: bt_rows
    pk_col: profiles.memberId
  outputs:
  - bt_rows_filtered

- step: FilterEmptyFamily
  id: bt_rows_filtered_profile_family
  params:
    input: bt_rows_filtered
    family_name: profiles
  outputs:
  - bt_rows_filtered_profile_family

- step: FilterEmptyFamily
  id: bt_rows_filtered_consents_family
  params:
    input: bt_rows_filtered
    family_name: consents
  outputs:
  - bt_rows_filtered_consents_family

# Step 6: Transform to target schemas (AWS and GCP branches)
- step: TransformSchemas
  id: transform_ms_member_output
  params:
    mapping_info: mapping_refresh
    table_name: ms_member
    input: bt_rows_filtered_profile_family
  outputs:
  - aws_ms_personas
  - gcp_ms_personas

# Step 6: Transform to target schemas (AWS and GCP branches)
- step: TransformSchemas
  id: transform_events_consents_output
  params:
    mapping_info: mapping_refresh
    table_name: events_consents
    input: bt_rows_filtered_consents_family
  outputs:
  - aws_events_consents
  - gcp_events_consents

# Step 7: Fulfill AWS schema with all fields
- step: FullfillSchemas
  id: full_aws
  params:
    table_name: ms_member
    mapping_info: mapping_refresh
    input: aws_ms_personas
  outputs:
  - aws_ms_member

# Step 8: Write GCP data to BigQuery CDC
- step: WriteToBigQueryCDC
  id: write_ms_member_bq_cdc
  params:
    table: "{io.bq.project}.{io.bq.dataset}.ms_personas"
    input: gcp_ms_personas
    primary_key: [ "memberId" ]
    change_type: "UPSERT"
    triggering_frequency: 5
    num_storage_api_streams: 5

# Step 8: Write GCP data to BigQuery CDC
- step: WriteToBigLakeIcebergStreaming
  id: write_events_consents
  params:
    table: "{io.bq.project}.{io.bq.dataset}.events_consents"
    input: gcp_events_consents
    primary_key: [ "personasId", "processDate" ]
    change_type: "UPSERT"
    triggering_frequency: 5
    num_storage_api_streams: 5

