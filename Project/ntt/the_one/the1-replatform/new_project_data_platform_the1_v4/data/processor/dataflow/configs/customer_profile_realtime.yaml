# Step 9: Write AWS data to S3 as Parquet
- step: WriteToS3Parquet
  id: write_s3
  params:
    bucket: "{io.s3.bucket}"
    window_size: 300 # 1 hour - ใช้ integer ไม่ใช่ string!
    # date_columns: "{parquet.date_columns}"
    # FIXED: Inline list instead of "{parquet.date_columns}"
    date_columns:
    - birth_date
    - consent_date
    - created_date
    - register_date
    - employee_join_date
    - employee_resign_date
    - passport_exp
    - updated_date

    output_filename: "ms-member.parquet"
    input: full_aws

# Step 10: Merge to Iceberg (runs independently every 5 minutes)
- step: MergeToIcebergStreaming
  id: merge_to_iceberg
  params:
    native_table: "{io.bq.project}.{io.bq.dataset}.ms_personas"
    iceberg_table: "{io.bq.project}.{io.bq.dataset}.ms_personas_iceberg"
    lookback_minutes: 30
    merge_interval_sec: 300
    merge_query: |
      MERGE `{io.bq.project}.{io.bq.dataset}.ms_personas_iceberg` AS T
      USING (
          SELECT * EXCEPT(rn)
          FROM (
              SELECT *,
                  ROW_NUMBER() OVER (
                      PARTITION BY memberId
                      ORDER BY updated_date DESC
                  ) AS rn
              FROM `{io.bq.project}.{io.bq.dataset}.ms_personas`
              WHERE COALESCE(updated_date, CURRENT_TIMESTAMP()) >=
                    TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 30 MINUTE)
          )
          WHERE rn = 1
      ) AS S
      ON T.memberId = S.memberId
      WHEN MATCHED AND S.updated_date > T.updated_date THEN
          UPDATE SET
              accountId = S.accountId, dateOfBirth = S.dateOfBirth,
              gender = S.gender, hasEmail = S.hasEmail, hasMobile = S.hasMobile,
              languagePrefer = S.languagePrefer, nationalityId = S.nationalityId,
              profileId = S.profileId, updated_date = S.updated_date
      WHEN NOT MATCHED THEN
          INSERT (accountId, dateOfBirth, gender, hasEmail, hasMobile,
                  languagePrefer, memberId, nationalityId, profileId, updated_date)
          VALUES (S.accountId, S.dateOfBirth, S.gender, S.hasEmail, S.hasMobile,
                  S.languagePrefer, S.memberId, S.nationalityId, S.profileId, S.updated_date)
