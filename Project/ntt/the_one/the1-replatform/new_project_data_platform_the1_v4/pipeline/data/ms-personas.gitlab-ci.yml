# ============================================
# PART 3: SETUP COMPOSER VARIABLES (After Terraform)
# ============================================
ms-personas:setup-composer-variables:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
    COMPOSER_LOCATION: asia-southeast1
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]

  # Get terraform outputs
  - cd $INFRASTRUCTURE_RUN_PATH
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
  - terraform init
  - terraform workspace select $WORKSPACE_ENV
  # Get all outputs
  - export COMPOSER_ENV=$(terraform output -raw composer_env_name)
  # - export MAPPING_TRANSFER_ID=$(terraform output -raw mapping_transfer_config_id)
  # - export MEMBER_TRANSFER_ID=$(terraform output -raw member_transfer_config_id)
  - export MAPPING_TRANSFER_ID=$(terraform output -raw mapping_transfer_config_id | sed 's|.*/||')
  - export MEMBER_TRANSFER_ID=$(terraform output -raw member_transfer_config_id | sed 's|.*/||')
  - export COMPOSER_BUCKET=$(terraform output -raw composer_bucket)
  - export AUDIT_BUCKET=$(terraform output -raw audit_bucket)
  - export ARTIFACT_REGISTRY_URL=$(terraform output -raw artifact_registry_url)
  - cd $CI_PROJECT_DIR

  # Set Airflow variables
  - |
    echo "Setting Composer Airflow Variables..."

    # Check if Composer is ready
    gcloud composer environments describe $COMPOSER_ENV \
      --location $COMPOSER_LOCATION \
      --project $GCP_STG_PROJECT_ID || exit 1

    # Function to set variable
    set_var() {
      gcloud composer environments run $COMPOSER_ENV \
        --location $COMPOSER_LOCATION \
        --project $GCP_STG_PROJECT_ID \
        variables set -- $1 "$2" || echo "Warning: Failed to set $1"
    }

    # Set all required variables
    set_var "project_id" "$GCP_STG_PROJECT_ID"
    set_var "environment" "$WORKSPACE_ENV"

    # Buckets
    set_var "bucket_composer" "gs://$COMPOSER_BUCKET"
    set_var "bucket_audit" "gs://$AUDIT_BUCKET"

    # DTS Config IDs - Important!
    set_var "mapping_transfer_config_id" "$MAPPING_TRANSFER_ID"
    set_var "member_transfer_config_id" "$MEMBER_TRANSFER_ID"

    # Dataflow configuration
    set_var "dataflow_sa_email" "t1-ins-$WORKSPACE_ENV-sa-data@the1-insight-$WORKSPACE_ENV.iam.gserviceaccount.com"
    set_var "dataflow_subnetwork" "https://www.googleapis.com/compute/v1/projects/the1-network-$WORKSPACE_ENV/regions/asia-southeast1/subnetworks/the1-subnet-dataflow-$WORKSPACE_ENV"
    set_var "dataflow_common_image" "$ARTIFACT_REGISTRY_URL/dataflow-common:latest"

    echo "Composer variables setup completed!"

  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  needs:
  # - ms-personas:terraform:apply:nonprod
  - processor:create-image:dataflow-common:nonprod
  when: manual # Run manually after terraform 
  rules:
  - !reference [ .execute-pipeline-template, rules ]
  - if: $TRIGGER_SET_COMPOSER_VARIABLES == "1"
    when: always
