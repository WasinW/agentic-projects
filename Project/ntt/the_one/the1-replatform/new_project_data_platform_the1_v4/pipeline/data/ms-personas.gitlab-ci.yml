# ============================================
# PART 2B: DATAFLOW_COMMON CHANGES (Build & Deploy)
# ============================================
# PART 1B: DEPLOY TABLES (After Terraform)
# Smart schema change detection with auto-migration
# ============================================


# ============================================
# PART 2A: DATAFLOW_COMMON CHANGES (Build & Deploy)
# ============================================
# Security scan (like triggers pattern)
sec:scan-secret:dataflow-common:
  stage: build
  tags:
  - $RUNNER_TAG_NONPROD
  extends:
  - sec:scan-secret
  variables:
    RUN_PATH: $RUN_PATH
    SERVICE_NAME: $SERVICE_NAME
  <<: *dataflow_common_rules

dataflow-common:test:
  stage: build
  tags:
  - $RUNNER_TAG_NONPROD
  image: $PYTHON_IMAGE
  script:
  - cd $RUN_PATH
  # ใช้ uv แทน pip (ใช้ --system ใน CI environment ที่เป็น container)
  - pip install uv
  - uv pip install --system --upgrade pip
  - uv pip install --system -e .
  - uv pip install --system pytest
  - cd tests
  # - python -m pytest -q . -v --tb=short
  # - cd ../../tests/
  <<: *dataflow_common_rules

# Build wheel
dataflow-common:build-wheel:
  stage: build
  tags:
  - $RUNNER_TAG_NONPROD
  image: $PYTHON_IMAGE
  variables:
    DEPLOYMENT_TAG: $CI_COMMIT_SHORT_SHA
  script:
  - cd $RUN_PATH
  - ls -la
  - pip install --upgrade pip setuptools wheel build
  - python -m build
  - ls -la dist/
  - pwd
  artifacts:
    when: on_success
    expire_in: 1h
    paths:
    - $RUN_PATH/dist/*.whl
  needs:
  - sec:scan-secret:dataflow-common
  - dataflow-common:test
  <<: *dataflow_common_rules

# Build Docker image (like triggers pattern)
processor:create-image:dataflow-common:nonprod:
  stage: deploy-stg
  tags:
  - cicd-nonprod
  image: $CONTAINER_BUILD_IMAGE
  variables:
    DEPLOYMENT_TAG: $CI_COMMIT_SHORT_SHA
    GOOGLE_APPLICATION_CREDENTIALS: '/kaniko/.docker/gcloud-key.json'
  retry:
    # เพิ่ม retry
    max: 2
    when:
    - script_failure
    - runner_system_failure
    - stuck_or_timeout_failure
  before_script:
  - mkdir -p /kaniko/.docker/
  script:
  - cat $INSIGHT_PROD_SA_CREDENTIALS | base64 -d > /kaniko/.docker/gcloud-key.json
  - echo "{\"credsStore\":\"ecr-login\"}" > /kaniko/.docker/config.json
  # Build with version tag format v1.XX
  - |
    VERSION_TAG="v1.${CI_PIPELINE_IID:-$DEPLOYMENT_TAG}"
    /kaniko/executor \
      --context "$CI_PROJECT_DIR/$RUN_PATH" \
      --dockerfile "$CI_PROJECT_DIR/$RUN_PATH/Dockerfile" \
      --destination "$GAR_STG_REPOSITORY_BASE_PATH/$GCP_STG_PROJECT_ID/$GAR_REPOSITORY_NAME/dataflow-common:$VERSION_TAG" \
      --destination "$GAR_STG_REPOSITORY_BASE_PATH/$GCP_STG_PROJECT_ID/$GAR_REPOSITORY_NAME/dataflow-common:$DEPLOYMENT_TAG" \
      --destination "$GAR_STG_REPOSITORY_BASE_PATH/$GCP_STG_PROJECT_ID/$GAR_REPOSITORY_NAME/dataflow-common:latest" \
      --cache=true \
      --cache-repo="$GAR_STG_REPOSITORY_BASE_PATH/$GCP_STG_PROJECT_ID/$GAR_REPOSITORY_NAME/dataflow-common/cache" \
      --snapshotMode=redo
  # - docker inspect <IMAGE_NAME> | grep "Architecture"
  after_script:
  - rm -f /kaniko/.docker/gcloud-key.json
  needs:
  - job: ms-personas:terraform:apply:nonprod
    optional: true
  - dataflow-common:build-wheel
  <<: *dataflow_common_rules

