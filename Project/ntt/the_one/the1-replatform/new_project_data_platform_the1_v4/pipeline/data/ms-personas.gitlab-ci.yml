# pipeline/data-pipeline.gitlab-ci.yml

stages:
- build
- deploy-stg
- test-stg
# - deploy-prod
# - test-prod

variables:
  RUNNER_TAG_NONPROD: 'nonprod-docker-cicd-x86'
  RUNNER_TAG_PROD: 'prod-docker-cicd-x86'
  SERVICE_NAME: 'insight-data-pipeline'
  SCRIPTS_PATH: 'data/'
  RUN_PATH: 'data/processor/dataflow/common'
  INFRASTRUCTURE_RUN_PATH: 'infrastructure/data-pipeline/'
  GAR_REPOSITORY_NAME: 'insight-datapipeline-dataflow-common'
  GCP_STG_PROJECT_ID: 'the1-insight-stg'
  GCP_PRD_PROJECT_ID: 'the1-insight-prod'
  GAR_PROD_REPOSITORY_BASE_PATH: 'asia-southeast1-docker.pkg.dev'
  GAR_STG_REPOSITORY_BASE_PATH: 'asia-southeast1-docker.pkg.dev'
  # PYTHON_IMAGE: 'python:3.9.24-slim'
  PYTHON_IMAGE: 'python:3.11-slim'
  CONTAINER_BUILD_IMAGE: 'gcr.io/kaniko-project/executor:v1.9.0-debug'

# ============================================
# RULES DEFINITIONS
# ============================================

# Rule for Terraform changes only
.terraform_rules: &terraform_rules
  rules:
  - !reference [ .execute-pipeline-template, rules ]
  # - changes:
  #   - infrastructure/ms-personas/secrets.tf
  #   when: never
  - changes:
    - infrastructure/data-pipeline/*.tf
    - infrastructure/data-pipeline/terraform.tfvars
    - pipeline/data/ms-personas.gitlab-ci.yml
    # - infrastructure/data-pipeline/**/*
    when: on_success
  - when: never

# Rule for dataflow_common changes (needs rebuild)
.dataflow_common_rules: &dataflow_common_rules
  rules:
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    - data/processor/dataflow/common/**/*
    - data/processor/dataflow/test/**/*
    - pipeline/data/ms-personas.gitlab-ci.yml
    when: on_success
  - when: never

# Rule for scripts/configs changes only (no rebuild needed)
.scripts_config_rules: &scripts_config_rules
  rules:
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    - data/orchestrator/airflow/**/*
    - data/processor/dataflow/configs/**/*
    - data/processor/dataflow/scripts/**/*
    - pipeline/data/ms-personas.gitlab-ci.yml
    when: on_success
  - when: never

.table_rules: &table_rules
  rules:
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    - infrastructure/data-pipeline/schemas/**/*
    - pipeline/data/ms-personas.gitlab-ci.yml
    when: on_success
  - when: never

# ============================================
# SHARED SCRIPTS (like ms-personas pattern)
# ============================================

.ms-personas-gcp-prepare:
  script:
  - |
    if [ "$WORKSPACE_ENV" = "prod" ]; then
      cat $T1_PIPELINE_SA | base64 -d > $GOOGLE_APPLICATION_CREDENTIALS_PATH
    fi
  - export GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS_PATH
  - gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH

.ms-personas-terraform-plan:
  script:
  - echo "terraform plan starting for data-pipeline"
  - cd $INFRASTRUCTURE_RUN_PATH
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
  - terraform init
  - terraform workspace select -or-create $WORKSPACE_ENV
  - terraform plan
.ms-personas-terraform-apply:
  script:
  - echo "terraform apply starting for data-pipeline"
  - cd $INFRASTRUCTURE_RUN_PATH
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
  - terraform init
  - terraform workspace select -or-create $WORKSPACE_ENV
  - terraform apply -auto-approve

# ============================================
# PART 1: TERRAFORM PROVISION (Infrastructure)
# ============================================

ms-personas:terraform:plan:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]
  - !reference [ .ms-personas-terraform-plan, script ]
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  needs:
  - sec:scan-secret:dataflow-common
  - dataflow-common:build-wheel
  <<: *terraform_rules

ms-personas:terraform:apply:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
    BIGQUERY_DATASET_ID: insight
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]
  - !reference [ .ms-personas-terraform-apply, script ]
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  needs:
  - ms-personas:terraform:plan:nonprod
  when: manual
  <<: *terraform_rules

