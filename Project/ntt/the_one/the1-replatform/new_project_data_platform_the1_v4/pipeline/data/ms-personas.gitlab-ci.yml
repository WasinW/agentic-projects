# Upload wheel to GCS
dataflow-common:upload-wheel:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  # image: google/cloud-sdk:alpine
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
    DEPLOYMENT_TAG: $CI_COMMIT_SHORT_SHA
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]
  # Get bucket name from terraform
  - cd $INFRASTRUCTURE_RUN_PATH
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
  - terraform init
  - terraform workspace select $WORKSPACE_ENV
  - export COMPOSER_BUCKET=$(terraform output -raw composer_bucket 2>/dev/null || echo "t1-airflow-composer-bucket")
  - echo $COMPOSER_BUCKET
  - cd $CI_PROJECT_DIR
  - ls -l /builds/The1central/The1/the1-api/insight-api/data/processor/dataflow/common/dist/*
  - ls -l $RUN_PATH/dist/*.whl
  - echo 'Uploading wheel to GCS...'
  # Upload wheel
  - gsutil rm gs://${COMPOSER_BUCKET}/dags/packages/*.whl || echo "Clean up old wheels"
  - gsutil cp $RUN_PATH/dist/*.whl gs://${COMPOSER_BUCKET}/dags/packages/
  - gsutil cp $RUN_PATH/dist/*.whl gs://${COMPOSER_BUCKET}/dags/packages/dataflow_common-$DEPLOYMENT_TAG.whl
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  needs:
  - dataflow-common:build-wheel
  - processor:create-image:dataflow-common:nonprod
  <<: *dataflow_common_rules

