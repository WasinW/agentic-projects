# PART 2C: SCRIPTS/CONFIG CHANGES ONLY (No rebuild)
# ============================================

# Upload DAGs and configs to GCS (like ms-personas dataflow step)
ms-personas:upload-scripts:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]

  # Get bucket names from terraform
  - cd $INFRASTRUCTURE_RUN_PATH
  - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
  - terraform init
  - terraform workspace select $WORKSPACE_ENV
  - export COMPOSER_BUCKET=$(terraform output -raw composer_bucket 2>/dev/null || echo "t1-airflow-composer-bucket-stg")
  - cd $CI_PROJECT_DIR
  - echo 'Copying scripts to GCS...'
  # Upload DAGs from new structure
  - |
    gsutil rm -r gs://${COMPOSER_BUCKET}/dags/*.py || echo "No existing dags to remove"
    sed -i "s/{WORKSPACE_ENV}/${WORKSPACE_ENV}/g" data/orchestrator/airflow/dags/*.py
    gsutil cp data/orchestrator/airflow/dags/*.py gs://${COMPOSER_BUCKET}/dags/
  # Upload dataflow scripts
  - |
    gsutil rm -r gs://${COMPOSER_BUCKET}/dataflow/ || echo "No existing dataflow to remove"
    gsutil cp data/processor/dataflow/scripts/*.py gs://${COMPOSER_BUCKET}/dataflow/scripts/
  # Upload configs if they exist
  - |
    gsutil rm -r gs://${COMPOSER_BUCKET}/config/ || echo "No existing config to remove"
    sed -i "s/{WORKSPACE_ENV}/${WORKSPACE_ENV}/g" data/processor/dataflow/configs/*.yaml
    gsutil cp data/processor/dataflow/configs/*.yaml gs://${COMPOSER_BUCKET}/config/
    # if [ -d "data/processor/dataflow/configs" ] && [ "$(ls -A data/processor/dataflow/configs/*.yaml 2>/dev/null)" ]; then
    #   sed -i "s/{WORKSPACE_ENV}/${WORKSPACE_ENV}/g" data/processor/dataflow/configs/*.yaml
    #   gsutil cp data/processor/dataflow/configs/*.yaml gs://${COMPOSER_BUCKET}/config/
    # fi
  # # Upload scripts
  # - |
  #   if [ -d "scripts" ]; then
  #     gsutil -m cp scripts/*.py gs://${DATAFLOW_BUCKET}/scripts/
  #   fi
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  # needs:
  # - ms-personas:terraform:apply:nonprod
  # - processor:create-image:dataflow-common:nonprod
  when: manual
  <<: *scripts_config_rules

