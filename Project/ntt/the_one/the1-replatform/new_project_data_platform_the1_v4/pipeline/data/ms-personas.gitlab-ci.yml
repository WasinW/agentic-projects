# ============================================
# PART 2A: DEPLOY TABLE
# ============================================
ms-personas:deploy-tables:nonprod:
  stage: deploy-stg
  tags:
  - $RUNNER_TAG_NONPROD
  image: google/cloud-sdk:alpine
  variables:
    WORKSPACE_ENV: stg
    PROJECT_ID: $GCP_STG_PROJECT_ID
    DATASET_ID: insight
    GOOGLE_APPLICATION_CREDENTIALS_PATH: $T1_PIPELINE_NP_SA
  script:
  - !reference [ .ms-personas-gcp-prepare, script ]
  - cd $INFRASTRUCTURE_RUN_PATH/
  - python3 schemas/deploy.py $PROJECT_ID $DATASET_ID $WORKSPACE_ENV
  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  # needs:
  # - ms-personas:terraform:apply:nonprod # ต้องรอ connection สร้างก่อน
  when: manual
  <<: *table_rules

