# ============================================
# FLEX TEMPLATE - DEPLOY STAGE (NEW)
# ============================================
data-loyalty-tiers:deploy:dataflow:nonprod:
  stage: deploy-stg
  image: google/cloud-sdk:latest
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    WORKSPACE_ENV: stg
    GOOGLE_APPLICATION_CREDENTIALS_PATH: "$CI_PROJECT_DIR/google-application-credentials.json"
    SPEC_TEMPLATE: "$CI_PROJECT_DIR/$MEMBER_TIERS_DATAFLOW_PATH/flex-template-spec-member-tiers.json"
    #  the1-loyalty-data-stg-pipeline-scripts
    GCP_PROJECT_ID: $GCP_STG_PROJECT_ID
    MEMBER_TIERS_DOCKER_IMAGE_NAME: 'member-tiers-dataflow'
    MEMBER_TIERS_SPEC_GCS_PATH: "gs://$GCP_STG_PROJECT_ID-pipeline-scripts/templates/$MEMBER_TIERS_DOCKER_IMAGE_NAME/flex-template-spec-member-tiers.json"
  before_script:
  - !reference [ .data-loyalty-tiers-gcp-prepare, script ]
  script:
  - set -euo pipefail

  # Get image path from artifact
  - test -f image-full.txt
  - IMAGE_FULL=$(head -n 1 image-full.txt)
  - echo "Image $IMAGE_FULL"

  # Render and upload template spec
  - sed "s|\${IMAGE_FULL}|$IMAGE_FULL|g" "$SPEC_TEMPLATE" > /tmp/spec.json
  - gsutil cp /tmp/spec.json "$MEMBER_TIERS_SPEC_GCS_PATH"
  - echo "Template uploaded to $MEMBER_TIERS_SPEC_GCS_PATH"

  # Check for existing running job
  - JOB_NAME="$MEMBER_TIERS_DATAFLOW_JOB_NAME"
  - ""
  - EXISTING_JOB=$(gcloud dataflow jobs list --project "$GCP_PROJECT_ID" --region "$DATAFLOW_REGION" --filter="name=${JOB_NAME} AND state=Running" --format="value(id)" | head -n 1 || true)
  - UPDATE_FLAG=""
  # - |
  #   if [ -n "$EXISTING_JOB" ]; then
  #     echo "Found existing job $EXISTING_JOB - will update"
  #     UPDATE_FLAG="--update"
  #   else
  #     echo "No existing job found - will create new"
  #   fi
  - |
    if [ -n "$EXISTING_JOB" ]; then
      echo "Stop Job ID: $EXISTING_JOB ..."
      gcloud dataflow jobs cancel "$EXISTING_JOB" \
        --project "$GCP_PROJECT_ID" \
        --region "$DATAFLOW_REGION"
    else
      echo "Not job running found"
    fi
  # --service-account-email "t1-loy-data-stg-sa-iac@$GCP_PROJECT_ID.iam.gserviceaccount.com" \
  # Deploy Flex Template
  - |
    gcloud dataflow flex-template run "$JOB_NAME" \
      --project "$GCP_PROJECT_ID" \
      --region "$DATAFLOW_REGION" \
      --template-file-gcs-location "$MEMBER_TIERS_SPEC_GCS_PATH" \
      --service-account-email "t1-loy-data-stg-sa-iac@$GCP_PROJECT_ID.iam.gserviceaccount.com" \
      --network "projects/the1-network-stg/global/networks/the1-vpc-net-share-stg" \
      --subnetwork "https://www.googleapis.com/compute/v1/projects/the1-network-stg/regions/$DATAFLOW_REGION/subnetworks/the1-subnet-dataflow-stg" \
      --max-workers 2 \
      --additional-experiments=use_runner_v2 \
      $UPDATE_FLAG \
      --parameters secret_project=$GCP_PROJECT_ID \
      --parameters secret_id=loyalty-data-purchases-collector \
      --parameters topic_type=both \
      --parameters writer_mode=beam_iceberg \
      --parameters auto_offset_reset=latest

  after_script:
  - rm -f $GOOGLE_APPLICATION_CREDENTIALS_PATH
  needs:
  # - data-loyalty-tiers:deploy:dataflow:nonprod
  - data-loyalty-tiers:build:image:nonprod
  <<: *member_tiers_dataflow_rules

