# ============================================
# FLEX TEMPLATE - BUILD STAGE (NEW)
# ============================================
data-loyalty-tiers:build:image:nonprod:
  stage: deploy-stg
  image:
    name: $CONTAINER_BUILD_IMAGE
    entrypoint: [ "" ]
  tags:
  - $RUNNER_TAG_NONPROD
  variables:
    DEPLOYMENT_TAG: $CI_COMMIT_SHORT_SHA
    GCP_PROJECT_ID: $GCP_STG_PROJECT_ID
    GOOGLE_APPLICATION_CREDENTIALS: "/kaniko/.docker/gcloud-key.json"
    MEMBER_TIERS_DOCKER_IMAGE_NAME: 'member-tiers-dataflow'
  before_script:
  - mkdir -p /kaniko/.docker
  - base64 -d "$T1_PIPELINE_NP_SA" > /kaniko/.docker/gcloud-key.json
  script:
  - |
    /kaniko/executor \
      --context "$CI_PROJECT_DIR/$MEMBER_TIERS_DATAFLOW_PATH" \
      --dockerfile "$CI_PROJECT_DIR/$MEMBER_TIERS_DATAFLOW_PATH/Dockerfile" \
      --destination "$GAR_REPOSITORY_BASE_PATH/$GCP_PROJECT_ID/$MEMBER_TIERS_GAR_REPOSITORY_NAME/$MEMBER_TIERS_DOCKER_IMAGE_NAME:$DEPLOYMENT_TAG" \
      --destination "$GAR_REPOSITORY_BASE_PATH/$GCP_PROJECT_ID/$MEMBER_TIERS_GAR_REPOSITORY_NAME/$MEMBER_TIERS_DOCKER_IMAGE_NAME:latest" \
      --image-name-tag-with-digest-file /workspace/image-full.txt
  - cat /workspace/image-full.txt
  - cp /workspace/image-full.txt "$CI_PROJECT_DIR/image-full.txt"
  artifacts:
    paths:
    - image-full.txt
  <<: *member_tiers_dataflow_rules

