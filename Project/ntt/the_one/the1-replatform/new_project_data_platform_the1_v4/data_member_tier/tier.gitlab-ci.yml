# Rule for Terraform changes only
.member_tiers_terraform_rules: &member_tiers_terraform_rules
  rules:
  - if: ($SERVICE_NAME != "Select Option") && ($SERVICE_NAME != $TIER_SERVICE_NAME)
    when: never
  - if: '$TRIGGER_TERRAFORM_APPLY_ALL == "1"'
    when: never
  - if: ($TRIGGER_MANUAL_DEPLOY == "1") && ($SERVICE_NAME == $TIER_SERVICE_NAME)
    when: never
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    # - infrastructure/common/GCP/*.tf
    # - infrastructure/common/GCP/*.tfvars
    - infrastructure/tier/*.tf
    - infrastructure/tier/*.tfvars
    # - pipeline/tier.gitlab-ci.yml
    when: on_success
  - when: never

.member_tiers_table_rules: &member_tiers_table_rules
  rules:
  - if: ($SERVICE_NAME != "Select Option") && ($SERVICE_NAME != $TIER_SERVICE_NAME)
    when: never
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    - infrastructure/tier/schemas/**/*
    # - pipeline/tier.gitlab-ci.yml
    when: on_success
  - when: never

.member_tiers_dataflow_rules: &member_tiers_dataflow_rules
  rules:
  - if: ($SERVICE_NAME != "Select Option") && ($SERVICE_NAME != $TIER_SERVICE_NAME)
    when: never
  - if: ($TRIGGER_MANUAL_DEPLOY == "1") && ($SERVICE_NAME == $TIER_SERVICE_NAME)
    when: never
  - !reference [ .execute-pipeline-template, rules ]
  - changes:
    - data-pipeline/processor/dataflow/scripts/member_tiers/member_tiers.py
    - pipeline/tier.gitlab-ci.yml
    when: on_success
  - when: never

# ============================================
# SHARED SCRIPTS (like data-loyalty-tiers pattern)
# ============================================
.data-loyalty-tiers-gcp-prepare:
  script:
  - |
    if [ "$WORKSPACE_ENV" = "prod" ]; then
      # T1_PIPELINE_SA is a *file* containing base64(JSON)
      base64 -d "$T1_PIPELINE_SA" > "$GOOGLE_APPLICATION_CREDENTIALS_PATH"
    else
      # T1_PIPELINE_NP_SA is a *file* containing base64(JSON)
      base64 -d "$T1_PIPELINE_NP_SA" > "$GOOGLE_APPLICATION_CREDENTIALS_PATH"
    fi
  - export GOOGLE_APPLICATION_CREDENTIALS="$GOOGLE_APPLICATION_CREDENTIALS_PATH"
  - gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"

